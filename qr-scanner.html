<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>QRコード読み取り</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f6f8;
      margin: 0;
      padding: 16px;
      color: #222;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 22px;
      margin: 0 0 12px;
      line-height: 1.4;
    }

    p {
      line-height: 1.7;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 15px 16px;
      font-size: 17px;
      font-weight: 800;
      margin-top: 14px;
      background: #06c755;
      color: #fff;
      cursor: pointer;
    }

    button.secondary {
      background: #607d8b;
    }

    button.zoom-button {
      width: auto;
      min-width: 72px;
      margin-top: 0;
      padding: 12px 14px;
      font-size: 18px;
      background: #1976d2;
    }

    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    #reader {
      margin-top: 16px;
      border-radius: 14px;
      overflow: hidden;
    }

    .notice {
      background: #eaf3ff;
      border-left: 5px solid #1976d2;
      padding: 12px;
      border-radius: 10px;
      margin: 12px 0;
      line-height: 1.7;
    }

    .danger {
      background: #ffecec;
      border-left: 5px solid #e53935;
      padding: 12px;
      border-radius: 10px;
      margin: 12px 0;
      line-height: 1.7;
      color: #b71c1c;
      font-weight: 700;
    }

    .small {
      font-size: 13px;
      color: #666;
      word-break: break-all;
      line-height: 1.6;
    }

    .zoom-controls {
      display: none;
      margin-top: 14px;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 14px;
      background: #f8fbff;
    }

    .zoom-controls.active {
      display: block;
    }

    .zoom-title {
      font-weight: 800;
      margin-bottom: 8px;
      color: #1976d2;
    }

    .zoom-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
    }

    .zoom-label {
      text-align: center;
      font-weight: 800;
      margin-top: 8px;
      color: #333;
    }

    input[type="range"] {
      width: 100%;
    }

    .zoom-note {
      font-size: 12px;
      color: #666;
      margin-top: 8px;
      line-height: 1.6;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <h1>QRコード読み取り</h1>

      <div class="notice">
        社員番号が入ったQRコードをカメラにかざしてください。<br>
        読み取りに成功すると、自動でログイン画面へ戻ります。<br><br>
        QRコードに近づけすぎるとピントが合わない場合があります。<br>
        10〜25cmほど離して、QRコード全体が画面内に入るようにしてください。
      </div>

      <button id="startButton" onclick="startScanner()">カメラを起動してQRを読む</button>
      <button class="secondary" onclick="goBack()">戻る</button>

      <div id="message" class="small"></div>

      <div id="zoomControls" class="zoom-controls">
        <div class="zoom-title">カメラ倍率調整</div>

        <div class="zoom-label" id="zoomLabel">倍率：-</div>

        <div class="zoom-row">
          <button type="button" class="zoom-button" onclick="zoomOut()">−</button>
          <input type="range" id="zoomSlider" min="1" max="3" step="0.1" value="3" oninput="onZoomSliderInput(this.value)">
          <button type="button" class="zoom-button" onclick="zoomIn()">＋</button>
        </div>

        <div class="zoom-note">
          QRが小さい場合は倍率を上げてください。<br>
          近づけすぎてボケる場合は、少し離して倍率で調整してください。
        </div>
      </div>

      <div id="reader"></div>
    </div>
  </div>

  <script>
    let html5QrCode = null;
    let isScanned = false;

    let cameraTrack = null;
    let zoomSupported = false;
    let zoomMin = 1;
    let zoomMax = 1;
    let zoomStep = 0.1;
    let currentZoom = 1;

    const INITIAL_ZOOM = 3;

    const params = new URLSearchParams(window.location.search);
    const returnUrl = params.get('returnUrl') || '';

    function showMessage(text, isError) {
      const message = document.getElementById('message');
      message.className = isError ? 'danger' : 'small';
      message.textContent = text;
    }

    function normalizeQrValue(value) {
      let text = String(value || '').trim();

      try {
        const url = new URL(text);
        const fromUrl =
          url.searchParams.get('id') ||
          url.searchParams.get('loginId') ||
          url.searchParams.get('employeeNo') ||
          url.searchParams.get('社員番号');

        if (fromUrl) {
          return String(fromUrl).trim();
        }
      } catch (e) {
        // URLでなければ無視
      }

      const match = text.match(/(?:社員番号|employeeNo|loginId|ID|id)[：:\s=]*([A-Za-z0-9_-]+)/i);
      if (match && match[1]) {
        return match[1].trim();
      }

      return text;
    }

    async function startScanner() {
      if (!returnUrl) {
        showMessage('戻り先URLが指定されていません。管理者に確認してください。', true);
        return;
      }

      if (html5QrCode) {
        return;
      }

      try {
        const startButton = document.getElementById('startButton');
        startButton.disabled = true;
        startButton.textContent = 'カメラ起動中...';

        html5QrCode = new Html5Qrcode('reader');

        await html5QrCode.start(
          { facingMode: 'environment' },
          {
            fps: 10,
            qrbox: { width: 250, height: 250 }
          },
          onScanSuccess,
          function() {}
        );

        await setupZoomControls(INITIAL_ZOOM);

        if (zoomSupported) {
          showMessage('カメラを起動しました。初期倍率を約' + formatZoom(currentZoom) + '倍に設定しました。QRコードを枠内に表示してください。', false);
        } else {
          showMessage('カメラを起動しました。この端末ではズーム操作に対応していないため、通常倍率で読み取ります。', false);
        }

      } catch (error) {
        const startButton = document.getElementById('startButton');
        startButton.disabled = false;
        startButton.textContent = 'カメラを起動してQRを読む';

        showMessage('カメラを起動できませんでした。ブラウザのカメラ許可設定を確認してください。', true);
      }
    }

    async function setupZoomControls(targetZoom) {
      try {
        cameraTrack = getCameraTrack();

        if (!cameraTrack) {
          zoomSupported = false;
          return;
        }

        if (!cameraTrack.getCapabilities || !cameraTrack.applyConstraints) {
          zoomSupported = false;
          return;
        }

        const capabilities = cameraTrack.getCapabilities();

        if (!capabilities.zoom) {
          zoomSupported = false;
          return;
        }

        zoomSupported = true;

        zoomMin = typeof capabilities.zoom.min === 'number' ? capabilities.zoom.min : 1;
        zoomMax = typeof capabilities.zoom.max === 'number' ? capabilities.zoom.max : targetZoom;
        zoomStep = typeof capabilities.zoom.step === 'number' && capabilities.zoom.step > 0
          ? capabilities.zoom.step
          : 0.1;

        const slider = document.getElementById('zoomSlider');
        slider.min = zoomMin;
        slider.max = zoomMax;
        slider.step = zoomStep;

        const initialZoom = clamp(targetZoom, zoomMin, zoomMax);

        await setZoom(initialZoom);

        document.getElementById('zoomControls').classList.add('active');

      } catch (error) {
        zoomSupported = false;
      }
    }

    function getCameraTrack() {
      const video = document.querySelector('#reader video');

      if (!video || !video.srcObject) {
        return null;
      }

      const tracks = video.srcObject.getVideoTracks();

      if (!tracks || tracks.length === 0) {
        return null;
      }

      return tracks[0];
    }

    async function setZoom(value) {
      if (!zoomSupported || !cameraTrack) {
        return;
      }

      const zoomValue = clamp(Number(value), zoomMin, zoomMax);

      try {
        await cameraTrack.applyConstraints({
          advanced: [
            { zoom: zoomValue }
          ]
        });

        currentZoom = zoomValue;

        const slider = document.getElementById('zoomSlider');
        const label = document.getElementById('zoomLabel');

        slider.value = currentZoom;
        label.textContent = '倍率：約' + formatZoom(currentZoom) + '倍';

      } catch (error) {
        showMessage('この端末では指定した倍率に変更できませんでした。', true);
      }
    }

    function zoomIn() {
      if (!zoomSupported) {
        return;
      }

      setZoom(currentZoom + zoomStep);
    }

    function zoomOut() {
      if (!zoomSupported) {
        return;
      }

      setZoom(currentZoom - zoomStep);
    }

    function onZoomSliderInput(value) {
      if (!zoomSupported) {
        return;
      }

      setZoom(value);
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function formatZoom(value) {
      return Math.round(Number(value) * 10) / 10;
    }

    async function onScanSuccess(decodedText) {
      if (isScanned) {
        return;
      }

      isScanned = true;

      const loginId = normalizeQrValue(decodedText);

      if (html5QrCode) {
        try {
          await html5QrCode.stop();
        } catch (e) {}
      }

      const separator = returnUrl.includes('?') ? '&' : '?';
      const nextUrl = returnUrl + separator + 'loginId=' + encodeURIComponent(loginId);

      window.location.href = nextUrl;
    }

    function goBack() {
      if (returnUrl) {
        window.location.href = returnUrl;
      } else {
        history.back();
      }
    }
  </script>
</body>
</html>
